<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I AM BORED - מדד השעמום הלאומי</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Assistant', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container { text-align: center; width: 90%; max-width: 600px; }

        h1 { font-size: 1rem; letter-spacing: 4px; color: #444; margin-bottom: 30px; text-transform: uppercase; }

        #main-status { font-size: 8rem; font-weight: 900; line-height: 1; margin: 10px 0; transition: all 0.3s ease; }

        #description { font-size: 1.4rem; margin-bottom: 40px; min-height: 4em; color: #ccc; line-height: 1.4; }

        .location-tag { background: #1a1a1a; padding: 6px 18px; border-radius: 20px; font-size: 0.85rem; color: #666; margin-bottom: 30px; display: inline-block; }

        .btn-group { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

        button {
            background: transparent;
            color: #888;
            border: 1px solid #333;
            padding: 10px 20px;
            font-size: 0.9rem;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.2s;
        }

        button:hover { border-color: #fff; color: #fff; }
        
        button.active { background: #fff; color: #000; border-color: #fff; }

        /* צבעים לפי מצב */
        .safe { color: #fff; } 
        .alert { color: #ff3b30; text-shadow: 0 0 20px rgba(255, 59, 48, 0.4); }
        .wait { color: #ffcc00; text-shadow: 0 0 20px rgba(255, 204, 0, 0.4); }
    </style>
</head>
<body>

    <div class="container">
        <h1>I AM BORED</h1>
        <div id="main-status" class="safe">...</div>
        <div id="description">אנא בחרו אזור לבדיקת רמת השעמום</div>
        <div class="location-tag" id="city-display">ממתין לבחירה</div>
        
        <div class="btn-group">
            <button onclick="updateBoredom('מרכז', this)">מרכז</button>
            <button onclick="updateBoredom('דרום', this)">דרום/עוטף</button>
            <button onclick="updateBoredom('צפון', this)">צפון</button>
            <button onclick="updateBoredom('ירושלים', this)">ירושלים</button>
        </div>
    </div>

    <script>
        function updateBoredom(region, btn) {
            const statusEl = document.getElementById('main-status');
            const descEl = document.getElementById('description');
            const cityEl = document.getElementById('city-display');

            // הסרת עיצוב מהכפתורים האחרים
            document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            cityEl.innerText = "נבדק עבור: " + region;

            if (region === 'מרכז') {
                statusEl.innerText = "כן.";
                statusEl.className = "safe";
                descEl.innerText = "רמת שעמום: 9.8. אתם בודקים בטלגרם אם הבומים היו רעמים או יירוטים מעל הים. לכו לשתות מאצ'ה ולחפש חניה.";
            } 
            else if (region === 'דרום') {
                statusEl.innerText = "חכה.";
                statusEl.className = "wait";
                descEl.innerText = "רמת שעמום: 2. אתם הגיבורים של המדינה. לכו לישון בממ\"ד עם חבילת במבה, זה הזמן הכי מעניין שיהיה לכם היום.";
            } 
            else if (region === 'צפון') {
                statusEl.innerText = "לא.";
                statusEl.className = "alert";
                descEl.innerText = "רמת שעמום: 0. הציפורים מצייצות, אבל אלו לא ציפורים. נא להישאר ליד המקלט ולתהות אם הצימר שסגרתם יחזור אי פעם.";
            }
            else if (region === 'ירושלים') {
                statusEl.innerText = "כן.";
                statusEl.className = "safe";
                descEl.innerText = "רמת שעמום: 10. פה לא קורה כלום חוץ מפקקים ורוח קרירה. לכו לאכול מעורב ירושלמי ותקומו ב-2027.";
            }
        }
    </script>
</body>
</html>
