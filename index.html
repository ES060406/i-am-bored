<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I AM BORED - מדד השעמום הלאומי</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Assistant', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .container { width: 90%; max-width: 600px; }

        h1 { font-size: 1rem; letter-spacing: 5px; color: #444; margin-bottom: 20px; }

        #main-status { font-size: 8rem; font-weight: 900; line-height: 1; margin: 10px 0; transition: all 0.4s ease; }

        #description { font-size: 1.5rem; margin-bottom: 40px; min-height: 4em; color: #ccc; line-height: 1.4; }

        .national-avg { background: #1a1a1a; padding: 10px 20px; border-radius: 50px; font-size: 0.9rem; color: #888; margin-bottom: 40px; border: 1px solid #333; }

        .btn-group { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

        button {
            background: #111;
            color: #fff;
            border: 1px solid #444;
            padding: 12px 24px;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.3s;
        }

        button:hover { background: #fff; color: #000; border-color: #fff; }

        /* צבעים */
        .white { color: #fff; }
        .red { color: #ff3b30; text-shadow: 0 0 15px rgba(255, 59, 48, 0.5); }
        .yellow { color: #ffcc00; text-shadow: 0 0 15px rgba(255, 204, 0, 0.5); }
    </style>
</head>
<body>

    <div class="container">
        <h1>I AM BORED</h1>
        
        <div class="national-avg">שקלול ארצי: <b>משעמם טילים (9.2)</b></div>

        <div id="main-status" class="white">כן.</div>
        
        <div id="description">
            המצב הנוכחי מאפשר התקלחות בטוחה, קיפול כביסה ובהייה בקיר למשך 20 דקות.
        </div>
        
        <div class="btn-group">
            <button onclick="setStatus('safe')">הכל שקט</button>
            <button onclick="setStatus('tense')">מתיחות</button>
            <button onclick="setStatus('action')">יש אקשן</button>
        </div>
    </div>

    <script>
        function setStatus(mode) {
            const statusEl = document.getElementById('main-status');
            const descEl = document.getElementById('description');

            if (mode === 'safe') {
                statusEl.innerText = "כן.";
                statusEl.className = "white";
                descEl.innerText = "רמת שעמום: 10. צאו למרפסת ותשאלו 'היה בום?' רק כדי להרגיש משהו בלב.";
            } 
            else if (mode === 'tense') {
                statusEl.innerText = "חכה.";
                statusEl.className = "yellow";
                descEl.innerText = "רמת שעמום: 4. זמן מצוין לסדר את המדף של השימורים בממ\"ד לפי תאריכי תפוגה.";
            } 
            else if (mode === 'action') {
                statusEl.innerText = "לא.";
                statusEl.className = "red";
                descEl.innerText = "רמת שעמום: 0. סוף סוף קורה משהו! רוצו לממ\"ד ותראו אם השכן שוב נכנס בלי חולצה.";
            }
        }
    </script>
</body>
</html>
