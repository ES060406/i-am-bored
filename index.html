<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I AM BORED - מדד השעמום</title>
    <style>
        body { background-color: #000; color: #fff; font-family: system-ui, -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        h1 { font-size: 1.2rem; color: #444; letter-spacing: 3px; margin-bottom: 20px; }
        #status { font-size: 6rem; font-weight: 900; margin: 10px 0; }
        #description { font-size: 1.5rem; max-width: 80%; margin-bottom: 30px; min-height: 3em; }
        .location { background: #1a1a1a; padding: 8px 20px; border-radius: 50px; font-size: 0.9rem; color: #888; }
        .safe { color: #fff; }
        .alert { color: #ff3b30; }
    </style>
</head>
<body>
    <h1>I AM BORED</h1>
    <div id="status" class="safe">כן.</div>
    <div id="description">טוען נתוני שעמום...</div>
    <div class="location" id="city">מזהה אזור...</div>
    
<script>
    const statusEl = document.getElementById('status');
    const descEl = document.getElementById('description');
    const cityEl = document.getElementById('city');

    async function checkBoredom() {
        try {
            // 1. זיהוי מיקום המשתמש (מערכת חלופית אמינה יותר)
            const geoRes = await fetch('https://ipapi.co');
            const geoData = await geoRes.json();
            const userCity = geoData.city || "ישראל";
            cityEl.innerText = "אזור: " + userCity;

            // 2. בדיקת התרעות אמת מפיקוד העורף (דרך שרת מתווך)
            const alertRes = await fetch('https://www.oref.org.il');
            const alerts = await alertRes.json();
            
            // בדיקה האם העיר של המשתמש מופיעה בהתרעות של ה-10 דקות האחרונות
            const isAlertActive = alerts.some(alert => alert.data.includes(userCity));

            if (isAlertActive) {
                statusEl.innerText = "לא.";
                statusEl.style.color = "#ff3b30"; // אדום
                descEl.innerText = "רמת שעמום: 0. אקשן בממ\"ד! זמן מצוין לבדוק אם השכנה שוב הביאה פשטידה.";
            } else {
                statusEl.innerText = "כן.";
                statusEl.style.color = "#fff"; // לבן
                descEl.innerText = "רמת שעמום: 9.9. אפשר למות מזה. צא למרפסת ותצעק 'היה בום?' רק כדי להרגיש משהו.";
            }
        } catch (e) {
            // אם יש חסימה, נציג מצב שגרה הומוריסטי
            cityEl.innerText = "אזור: ישראל (כנראה)";
            statusEl.innerText = "כן.";
            descEl.innerText = "השעמום כל כך חזק שהוא חסם לנו את ה-API. לכי תאכלי משהו.";
        }
    }

    checkBoredom();
    setInterval(checkBoredom, 30000); // עדכון אוטומטי כל 30 שניות
</script>

</body>
</html>
