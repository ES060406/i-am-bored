<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I AM BORED - מדד השעמום</title>
    <style>
        body { background-color: #000; color: #fff; font-family: system-ui, -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        h1 { font-size: 1.2rem; color: #444; letter-spacing: 3px; margin-bottom: 20px; }
        #status { font-size: 6rem; font-weight: 900; margin: 10px 0; }
        #description { font-size: 1.5rem; max-width: 80%; margin-bottom: 30px; min-height: 3em; }
        .location { background: #1a1a1a; padding: 8px 20px; border-radius: 50px; font-size: 0.9rem; color: #888; }
        .safe { color: #fff; }
        .alert { color: #ff3b30; }
    </style>
</head>
<body>
    <h1>I AM BORED</h1>
    <div id="status" class="safe">כן.</div>
    <div id="description">טוען נתוני שעמום...</div>
    <div class="location" id="city">מזהה אזור...</div>

    <script>
        async function checkBoredom() {
            try {
                const res = await fetch('https://ipapi.co');
                const data = await res.json();
                document.getElementById('city').innerText = "אזור: " + (data.city || "ישראל");
                
                // כאן אנחנו מגדירים את ה"מצב" - כרגע שגרה
                const isAlert = false; 

                if (isAlert) {
                    document.getElementById('status').innerText = "לא.";
                    document.getElementById('status').className = "alert";
                    document.getElementById('description').innerText = "רמת שעמום: 0. רוץ לממ\"ד ותראה אם השכן שוב שכח לשים חולצה.";
                } else {
                    document.getElementById('status').innerText = "כן.";
                    document.getElementById('description').innerText = "רמת שעמום: 9.9. אפשר למות מזה. צא למרפסת ותצעק 'היה בום?' רק כדי להרגיש משהו.";
                }
            } catch (e) {
                document.getElementById('description').innerText = "תקלה בחיבור לפיקוד השעמום.";
            }
        }
        checkBoredom();
    </script>
</body>
</html>
